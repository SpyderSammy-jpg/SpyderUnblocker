  <script>
    let clickCount = 0;
    const titleEl = document.getElementById('main-title');

    titleEl.addEventListener('click', () => {
      clickCount++;
      if (clickCount === 3) {
        document.getElementById('admin-auth-popup').style.display = 'block';
        clickCount = 0;
      }
      setTimeout(() => { clickCount = 0; }, 800);
    });

    function checkAdmin() {
      const user = document.getElementById('adm-user').value;
      const pass = document.getElementById('adm-pass').value;

      if (user === "Sharvesh" && pass === "00010698") {
        localStorage.setItem('isAdmin', 'full');
        location.reload();
      } else if (user === "Rayhaan" && pass === "222") {
        localStorage.setItem('isAdmin', 'limited');
        location.reload();
      }
    }

    function logoutAdmin() {
      localStorage.removeItem('isAdmin');
      location.reload();
    }

    function toggleAdminMenu() {
      const m = document.getElementById('admin-menu');
      m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function toggleEdit() {
      const e = document.getElementById('edit-popup');
      e.style.display = (e.style.display === 'block') ? 'none' : 'block';
    }

    function toggleConsole() {
      const c = document.getElementById('admin-console');
      c.style.display = (c.style.display === 'block') ? 'none' : 'block';
    }

    window.onload = () => {
      document.getElementById('crown-btn').style.display =
        localStorage.getItem('isAdmin') ? 'block' : 'none';
    };
  </script>
